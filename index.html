<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlexTech</title>
<style>
body {margin:0; font-family:Arial,sans-serif; color:white; background:radial-gradient(circle at top, #1e3a8a, #0f172a 60%); overflow-x:hidden;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:rgba(2,6,23,0.8);}
.menu-icon{cursor:pointer;font-size:26px;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px;}
.card{background:rgba(30,41,59,0.7);padding:15px;border-radius:12px;text-align:center;position:relative;}
.add-btn{margin-top:10px;padding:8px;background:#2563eb;color:white;border:none;border-radius:5px;cursor:pointer;}
.socials img{width:30px;height:30px;margin:0 5px;cursor:pointer;vertical-align:middle;}
#admin-panel{position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.8);padding:15px;border-radius:10px;z-index:9999;display:none;}
#admin-panel label{display:block;margin:5px 0;color:white;}
#admin-panel input[type=range]{width:100%;}
#toggle-admin-btn{position:fixed;bottom:10px;left:10px;z-index:1000;padding:8px 12px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;}
.pencil{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);border-radius:50%;padding:4px;cursor:pointer;}
footer{text-align:center;padding:20px;background:rgba(2,6,23,0.8);}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <img id="logo" src="https://i.imgur.com/5D1Hdqp.jpg" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
    <h1 contenteditable="true">AlexTech</h1>
  </div>
  <div class="menu-icon" onclick="openMenu()">☰</div>
</header>

<div id="home">
<h1 contenteditable="true" style="text-align:center;">Discover Premium Tech</h1>
<p contenteditable="true" style="text-align:center;">Modern gadgets. Clean experience. Smarter choices.</p>

<div class="products" id="home-images">
  <div class="card" id="home-img-1">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" style="width:100%; border-radius:10px;">
    <div class="pencil" onclick="replaceHomeImage('home-img-1')">✏️</div>
  </div>
  <div class="card" id="home-img-2">
    <img src="https://images.unsplash.com/photo-1518441902110-43c2a2b88e4f" style="width:100%; border-radius:10px;">
    <div class="pencil" onclick="replaceHomeImage('home-img-2')">✏️</div>
  </div>
</div>

<div class="socials" style="text-align:center;padding:20px;">
  <a href="https://pin.it/5D1HdqpAC" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Pinterest-logo.png"></a>
  <a href="https://youtube.com/@alextech334?si=XbEMxj7nXB0vp-g4" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg"></a>
  <a href="https://www.instagram.com/alextechvisuals?igsh=eTBteWJhcW5tbjRl" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"></a>
</div>
</div>

<!-- STORE EXAMPLE -->
<div class="store" id="store">
<section id="deals">
<h2>Deals🔥</h2>
<button class="add-btn" onclick="goHome()">← Back</button>
<div class="products" id="deals-products"></div>
</section>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h4>Admin Controls</h4>
    <button onclick="adminPanel.style.display='none'" style="background:red;color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;">✖</button>
  </div>
  <label>Font Size: <input type="range" min="12" max="50" id="font-size-slider"></label>
  <label>Font Weight: <input type="range" min="100" max="900" step="100" id="font-weight-slider"></label>
  <label>Image Width (%): <input type="range" min="10" max="100" id="img-width-slider"></label>
  <button onclick="deselectElement()">Deselect</button>
</div>

<!-- TOGGLE ADMIN BUTTON -->
<button id="toggle-admin-btn">Admin</button>

<footer>
<p>Contact: alextechvisuals@gmail.com</p>
</footer>

<script>
// OPEN/CLOSE ADMIN
const adminPanel = document.getElementById("admin-panel");
const toggleAdminBtn = document.getElementById("toggle-admin-btn");

toggleAdminBtn.addEventListener("click", ()=>{
  if(adminPanel.style.display==="block") adminPanel.style.display="none";
  else adminPanel.style.display="block";
});

// SELECT ELEMENT
let selectedElement=null;
function selectElement(el){ selectedElement=el; }
function deselectElement(){ selectedElement=null; }

// CONTROL SLIDERS
document.getElementById("font-size-slider").addEventListener("input",function(){ if(selectedElement) selectedElement.style.fontSize=this.value+"px"; });
document.getElementById("font-weight-slider").addEventListener("input",function(){ if(selectedElement) selectedElement.style.fontWeight=this.value; });
document.getElementById("img-width-slider").addEventListener("input",function(){ if(selectedElement) selectedElement.style.width=this.value+"%"; });

// IMAGE REPLACEMENT
function replaceHomeImage(id){
  let input=document.createElement("input"); input.type="file"; input.accept="image/*";
  input.onchange=function(){
    let file=input.files[0]; if(file.size>2*1024*1024){ alert("Max 2MB"); return; }
    let reader=new FileReader();
    reader.onload=function(e){ document.getElementById(id).querySelector("img").src=e.target.result; };
    reader.readAsDataURL(file);
  }; input.click();
}

// MENU
function openMenu(){ document.getElementById("store").style.display="block"; }
function closeMenu(){ document.getElementById("store").style.display="none"; }
function goHome(){ document.getElementById("home").style.display="block"; document.getElementById("store").style.display="none"; }

// ADD PRODUCT EXAMPLE
function addProduct(sectionId){
  let url=prompt("Product link:"); let img=prompt("Image URL:");
  if(url && img){
    let card=document.createElement("div"); card.className="card";
    card.innerHTML=`<img src="${img}" style="width:100%"><br><a href="${url}" target="_blank" class="add-btn">🛒 Buy</a>`;
    document.getElementById(sectionId).appendChild(card);
  }
}
</script>
</body>
</html>
